<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{TITLE}}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Apple Color Palette */
            --color-black: #000000;
            --color-gray-dark: #1d1d1f;
            --color-gray-sub: #6e6e73;
            --color-gray-light: #86868b;
            --color-bg-light: #f5f5f7;
            --color-border: rgba(0, 0, 0, 0.08);
            
            --color-blue: #0071e3;
            --color-blue-light: #f5fafd;
            --color-blue-border: rgba(0, 113, 227, 0.15);
            
            --color-green: #34c759;
            --color-green-light: #f6fdf8;
            --color-green-border: rgba(52, 199, 89, 0.15);
            
            --color-amber: #ff9500;
            --color-amber-light: #fffcf6;
            --color-amber-border: rgba(255, 149, 0, 0.15);
            
            --color-red: #ff3b30;
            --color-red-light: #fff5f5;
            --color-red-border: rgba(255, 59, 48, 0.15);
            
            --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: "DM Serif Display", Georgia, serif;
            --radius-card: 20px;
            --radius-pill: 100px;
            --shadow-apple: 0 8px 30px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.02);
        }

        @page {
            size: A4;
            margin: 0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-system);
            color: var(--color-gray-dark);
            line-height: 1.65;
            background-color: #ffffff;
            -webkit-print-color-adjust: exact;
            font-size: 14px;
        }

        /* Front Cover Page */
        .cover-page {
            height: 98vh; /* Full A4 page height for cover */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: radial-gradient(circle at top left, #f5fafd 0%, #ffffff 50%, #f6fdf8 100%);
            padding: 80px 60px;
            box-sizing: border-box;
            page-break-after: always;
            text-align: center;
        }

        .cover-top {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cover-badge {
            background-color: var(--color-gray-dark);
            color: #ffffff;
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 30px;
        }

        .cover-title-box {
            margin-top: 40px;
            max-width: 600px;
        }

        .cover-title {
            font-family: var(--font-serif);
            font-size: 44px;
            line-height: 1.15;
            color: var(--color-black);
            font-weight: 400;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .cover-subtitle {
            font-size: 16px;
            color: var(--color-gray-sub);
            font-weight: 400;
            max-width: 450px;
            margin: 0 auto;
        }

        .cover-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid var(--color-border);
            padding-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .cover-doctor {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-gray-dark);
            margin-bottom: 6px;
        }

        .cover-meta {
            font-size: 12px;
            color: var(--color-gray-light);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Content Pages */
        .page {
            background-color: #ffffff;
            min-height: 98vh;
            page-break-after: always;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .header {
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 12px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--color-gray-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .header-logo {
            font-weight: 700;
            color: var(--color-gray-dark);
        }

        /* Typography */
        h1 {
            font-family: var(--font-serif);
            font-size: 30px;
            color: var(--color-black);
            font-weight: 400;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-gray-dark);
            margin-top: 30px;
            margin-bottom: 16px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--color-border);
            page-break-inside: avoid;
        }

        h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-gray-dark);
            margin-top: 20px;
            margin-bottom: 10px;
            page-break-inside: avoid;
        }

        p {
            font-size: 13.5px;
            margin-bottom: 14px;
            color: var(--color-gray-sub);
        }

        strong {
            color: var(--color-gray-dark);
            font-weight: 600;
        }

        ul, ol {
            margin-bottom: 20px;
            padding-left: 20px;
            color: var(--color-gray-sub);
            font-size: 13.5px;
        }

        li {
            margin-bottom: 8px;
        }

        /* Cards & Layout */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 20px 0;
            page-break-inside: avoid;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            padding: 24px;
            box-shadow: var(--shadow-apple);
            page-break-inside: avoid;
        }

        .card-title {
            font-size: 14.5px;
            font-weight: 600;
            color: var(--color-gray-dark);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Callout Boxes / Alerts */
        .alert {
            background-color: var(--color-blue-light);
            border: 1px solid var(--color-blue-border);
            border-left: 4px solid var(--color-blue);
            padding: 16px 20px;
            border-radius: 14px;
            margin: 20px 0;
            page-break-inside: avoid;
            font-size: 13px;
        }

        .alert-warning {
            background-color: var(--color-amber-light);
            border: 1px solid var(--color-amber-border);
            border-left: 4px solid var(--color-amber);
        }

        .alert-danger {
            background-color: var(--color-red-light);
            border: 1px solid var(--color-red-border);
            border-left: 4px solid var(--color-red);
        }

        .alert-success {
            background-color: var(--color-green-light);
            border: 1px solid var(--color-green-border);
            border-left: 4px solid var(--color-green);
        }

        .alert-title {
            font-weight: 600;
            color: var(--color-gray-dark);
            margin-bottom: 4px;
            font-size: 13.5px;
        }

        .alert p {
            margin: 0;
            color: var(--color-gray-sub);
        }

        /* Checklists */
        .checklist-container {
            margin: 20px 0;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            background: var(--color-bg-light);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--color-border);
            page-break-inside: avoid;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--color-gray-light);
            border-radius: 6px;
            margin-right: 14px;
            flex-shrink: 0;
            background: #ffffff;
            margin-top: 2px;
        }

        .checklist-content h4 {
            margin: 0 0 4px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-gray-dark);
        }
        
        .checklist-content p {
            margin: 0;
            font-size: 12.5px;
            color: var(--color-gray-sub);
        }

        /* Modern Tables */
        .table-container {
            margin: 20px 0;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            page-break-inside: avoid;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        th {
            background-color: var(--color-bg-light);
            color: var(--color-gray-dark);
            font-weight: 600;
            padding: 14px 18px;
            border-bottom: 1px solid var(--color-border);
        }

        td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-gray-sub);
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .pill-blue { background-color: var(--color-blue-light); color: var(--color-blue); }
        .pill-green { background-color: var(--color-green-light); color: var(--color-green); }
        .pill-amber { background-color: var(--color-amber-light); color: var(--color-amber); }
        .pill-red { background-color: var(--color-red-light); color: var(--color-red); }

        /* Icon Wrapper */
        .icon-box {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .icon-box-blue { background-color: var(--color-blue-light); color: var(--color-blue); }
        .icon-box-green { background-color: var(--color-green-light); color: var(--color-green); }
        .icon-box-amber { background-color: var(--color-amber-light); color: var(--color-amber); }
        .icon-box-red { background-color: var(--color-red-light); color: var(--color-red); }

        .flex-row-align {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Footer inside pages */
        .footer-note {
            margin-top: auto;
            border-top: 1px solid var(--color-border);
            padding-top: 16px;
            font-size: 11px;
            color: var(--color-gray-light);
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- Cover Page -->
    <div class="cover-page">
        <div class="cover-top">
            <div class="cover-badge">{{TYPE}}</div>
            <div class="cover-title-box">
                <h1 class="cover-title">{{TITLE}}</h1>
                <p class="cover-subtitle">Material educativo interactivo y oficial para la preparación preoperatoria del paciente quirúrgico.</p>
            </div>
        </div>
        <div class="cover-footer">
            <p class="cover-doctor">Dr. Jhonatan Guevara Marín</p>
            <p class="cover-meta">Médico Anestesiólogo · CMP 074566 · RNE 051391</p>
        </div>
    </div>

    <!-- Content injected here -->
    {{CONTENT}}

</body>
</html>
