<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{TITLE}}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --sky-50: #f0f9ff;
            --sky-100: #e0f2fe;
            --sky-500: #0ea5e9;
            --sky-600: #0284c7;
            --emerald-50: #ecfdf5;
            --emerald-100: #d1fae5;
            --emerald-600: #059669;
        }

        @page {
            margin: 0;
            size: A4;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--slate-800);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            -webkit-print-color-adjust: exact;
        }

        /* Front Page */
        .cover-page {
            height: 90vh; /* Leave room for margins */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e0f2fe 0%, #f5f5f7 50%, #d1fae5 100%);
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            page-break-after: always;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .cover-badge {
            background-color: var(--slate-900);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        .cover-title {
            font-family: 'DM Serif Display', serif;
            font-size: 48px;
            line-height: 1.1;
            color: var(--slate-900);
            margin: 0 0 20px 0;
            max-width: 80%;
        }

        .cover-author {
            margin-top: 60px;
            font-size: 18px;
            font-weight: 500;
            color: var(--slate-600);
            background: white;
            padding: 16px 32px;
            border-radius: 100px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Content Pages */
        .page {
            background-color: white;
            padding: 0;
            box-sizing: border-box;
        }

        .header {
            border-bottom: 2px solid var(--slate-100);
            padding-bottom: 16px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-weight: 600;
            color: var(--slate-500);
            font-size: 14px;
        }

        .header-logo {
            font-weight: 700;
            color: var(--slate-900);
            font-size: 14px;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 36px;
            color: var(--slate-900);
            margin-top: 0;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            color: var(--sky-600);
            margin-top: 40px;
            border-bottom: 1px solid var(--sky-100);
            padding-bottom: 8px;
            page-break-inside: avoid;
        }

        h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--slate-800);
            margin-top: 24px;
            page-break-inside: avoid;
        }

        p {
            font-size: 15px;
            margin-bottom: 16px;
            color: var(--slate-600);
        }

        ul, ol {
            margin-bottom: 24px;
            padding-left: 24px;
            color: var(--slate-600);
            font-size: 15px;
        }

        li {
            margin-bottom: 8px;
        }

        /* Custom UI Elements */
        .alert {
            background-color: var(--sky-50);
            border: 1px solid var(--sky-100);
            border-left: 4px solid var(--sky-500);
            padding: 16px 20px;
            border-radius: 8px;
            margin: 24px 0;
            page-break-inside: avoid;
        }

        .alert-warning {
            background-color: #fffbeb;
            border: 1px solid #fef3c7;
            border-left: 4px solid #f59e0b;
        }

        .alert p {
            margin: 0;
            color: var(--slate-800);
        }

        .alert strong {
            display: block;
            margin-bottom: 4px;
            color: var(--slate-900);
        }

        /* Checklists */
        .checklist-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
            background: var(--slate-50);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--slate-200);
            page-break-inside: avoid;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--slate-400);
            border-radius: 6px;
            margin-right: 16px;
            flex-shrink: 0;
            background: white;
        }

        .checklist-content h4 {
            margin: 0 0 4px 0;
            font-size: 16px;
            color: var(--slate-900);
        }
        
        .checklist-content p {
            margin: 0;
            font-size: 14px;
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 40px;
            left: 80px;
            right: 80px;
            border-top: 1px solid var(--slate-200);
            padding-top: 16px;
            font-size: 12px;
            color: var(--slate-400);
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Cover Page -->
    <div class="cover-page">
        <div class="cover-badge">{{TYPE}}</div>
        <h1 class="cover-title">{{TITLE}}</h1>
        <div class="cover-author">
            <strong>Dr. Jhonatan Guevara</strong><br>
            <span style="font-size: 14px; font-weight: 400; color: #64748b;">Médico Anestesiólogo · CMP 074566</span>
        </div>
    </div>

    <!-- Content injected here -->
    {{CONTENT}}

</body>
</html>
